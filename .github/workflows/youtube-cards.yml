name: GitHub Readme YouTube Cards
on:
  schedule:
    # Runs every hour, on the hour
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Checkout do repositório
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Python (necessário para a action)
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # Executar a ação de YouTube Cards
      - name: Generate YouTube Cards
        uses: DenverCoder1/github-readme-youtube-cards@main
        with:
          channel_id: UCpOdQTaDC2vc4qRPV3IxVTg
          max_videos: 6
          card_width: 250
          comment_tag_name: YOUTUBE-CARDS
          show_duration: false
          author_name: "github-actions[bot]"
          author_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "docs: Update YouTube cards"
          readme_path: "README.md"

      # Opcional: Se quiser personalizar cores
      # background_color: "#0d1117"
      # title_color: "#ffffff"
      # stats_color: "#dedede"
